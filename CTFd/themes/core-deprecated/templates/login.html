{% extends "base.html" %}

{% block content %}
<div class="jumbotron">
	<div class="container">
		<h1>LOGIN</h1>
	</div>
</div>

<div class="container">
	<div class="row justify-content-center">
		<div class="col-lg-5 col-md-7">
			<div class="login-box">
				<!-- Network Animation -->
				<canvas class="network-bg"></canvas>
				
				<div class="box-content">
					<!-- Header -->
					<div class="header-section">
						<h2>WELCOME BACK</h2>
						<p>Sign in to your account</p>
					</div>
					
					<!-- Form -->
					<form method="POST">
						<div class="form-field">
							<label>USERNAME</label>
							<input type="text" name="name" placeholder="Enter username" required autofocus>
						</div>
						
						<div class="form-field">
							<label>PASSWORD</label>
							<div class="password-input">
								<input type="password" id="password" name="password" placeholder="Enter password" required>
								<button type="button" class="eye-toggle" onclick="togglePassword()">
									<svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
										<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
										<circle cx="12" cy="12" r="3"></circle>
									</svg>
								</button>
							</div>
						</div>
						
						<div class="form-options">
							<a href="{{ url_for('auth.reset_password') }}">Forgot password?</a>
						</div>
						
						<button type="submit" class="submit-btn">
							LOGIN
						</button>
					</form>
					
					<!-- Footer -->
					<div class="box-footer">
						<p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<style>
.login-box {
	background: linear-gradient(135deg, rgba(10, 10, 20, 0.95), rgba(26, 26, 46, 0.95));
	border: 1px solid rgba(0, 217, 255, 0.2);
	margin: 3rem 0;
	position: relative;
	overflow: hidden;
	box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.network-bg {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	opacity: 0.15;
	pointer-events: none;
}

.box-content {
	position: relative;
	z-index: 1;
	padding: 3rem 2.5rem;
}

.header-section {
	text-align: center;
	margin-bottom: 3rem;
	padding-bottom: 2rem;
	border-bottom: 1px solid rgba(0, 217, 255, 0.1);
}

.header-section h2 {
	color: #00d9ff;
	font-family: "Rajdhani", sans-serif;
	font-size: 1.8rem;
	font-weight: 700;
	letter-spacing: 3px;
	margin-bottom: 0.5rem;
}

.header-section p {
	color: rgba(224, 244, 255, 0.7);
	font-size: 0.95rem;
	margin: 0;
}

.form-field {
	margin-bottom: 2rem;
}

.form-field label {
	display: block;
	color: #00d9ff;
	font-family: "Rajdhani", sans-serif;
	font-size: 0.85rem;
	font-weight: 700;
	letter-spacing: 2px;
	margin-bottom: 0.75rem;
}

.form-field input {
	width: 100%;
	background: rgba(10, 10, 20, 0.6);
	border: 2px solid rgba(0, 217, 255, 0.3);
	color: #e0f4ff;
	font-size: 1rem;
	padding: 0.875rem 1rem;
	transition: all 0.3s ease;
}

.form-field input:focus {
	outline: none;
	background: rgba(10, 10, 20, 0.8);
	border-color: #00d9ff;
	box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
}

.password-input {
	position: relative;
}

.password-input input {
	padding-right: 45px;
}

.eye-toggle {
	position: absolute;
	right: 12px;
	top: 50%;
	transform: translateY(-50%);
	background: none;
	border: none;
	color: rgba(0, 217, 255, 0.6);
	cursor: pointer;
	padding: 0.5rem;
	transition: color 0.3s ease;
}

.eye-toggle:hover {
	color: #00d9ff;
}

.form-options {
	text-align: right;
	margin-bottom: 1.5rem;
}

.form-options a {
	color: rgba(0, 217, 255, 0.7);
	font-size: 0.9rem;
	text-decoration: none;
	transition: color 0.3s ease;
}

.form-options a:hover {
	color: #00d9ff;
	text-decoration: underline;
}

.submit-btn {
	width: 100%;
	background: linear-gradient(135deg, #00d9ff, #0066ff);
	border: none;
	color: #000;
	font-family: "Rajdhani", sans-serif;
	font-size: 1rem;
	font-weight: 700;
	letter-spacing: 2px;
	padding: 1rem;
	cursor: pointer;
	transition: all 0.3s ease;
}

.submit-btn:hover {
	transform: translateY(-2px);
	box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
}

.box-footer {
	text-align: center;
	margin-top: 2rem;
	padding-top: 2rem;
	border-top: 1px solid rgba(0, 217, 255, 0.1);
}

.box-footer p {
	color: rgba(224, 244, 255, 0.7);
	font-size: 0.95rem;
	margin: 0;
}

.box-footer a {
	color: #00d9ff;
	font-weight: 600;
	text-decoration: none;
}

.box-footer a:hover {
	color: #ff00ff;
	text-decoration: underline;
}

@media (max-width: 768px) {
	.box-content {
		padding: 2rem 1.5rem;
	}
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
	const canvas = document.querySelector('.network-bg');
	const ctx = canvas.getContext('2d');
	const box = document.querySelector('.login-box');
	
	canvas.width = box.offsetWidth;
	canvas.height = box.offsetHeight;
	
	const nodes = [];
	const nodeCount = 15;
	
	class Node {
		constructor() {
			this.x = Math.random() * canvas.width;
			this.y = Math.random() * canvas.height;
			this.vx = (Math.random() - 0.5) * 0.5;
			this.vy = (Math.random() - 0.5) * 0.5;
			this.radius = Math.random() * 1.5 + 0.5;
		}
		
		update() {
			this.x += this.vx;
			this.y += this.vy;
			if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
			if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
		}
		
		draw() {
			ctx.beginPath();
			ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
			ctx.fillStyle = '#00d9ff';
			ctx.shadowBlur = 8;
			ctx.shadowColor = '#00d9ff';
			ctx.fill();
			ctx.shadowBlur = 0;
		}
	}
	
	for (let i = 0; i < nodeCount; i++) nodes.push(new Node());
	
	function animate() {
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		nodes.forEach(node => { node.update(); node.draw(); });
		
		for (let i = 0; i < nodes.length; i++) {
			for (let j = i + 1; j < nodes.length; j++) {
				const dx = nodes[i].x - nodes[j].x;
				const dy = nodes[i].y - nodes[j].y;
				const distance = Math.sqrt(dx * dx + dy * dy);
				if (distance < 100) {
					ctx.beginPath();
					ctx.moveTo(nodes[i].x, nodes[i].y);
					ctx.lineTo(nodes[j].x, nodes[j].y);
					ctx.strokeStyle = `rgba(0, 217, 255, ${(1 - distance / 100) * 0.25})`;
					ctx.lineWidth = 0.5;
					ctx.stroke();
				}
			}
		}
		requestAnimationFrame(animate);
	}
	animate();
});

function togglePassword() {
	const input = document.getElementById('password');
	const icon = document.getElementById('eyeIcon');
	if (input.type === 'password') {
		input.type = 'text';
		icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
	} else {
		input.type = 'password';
		icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
	}
}
</script>
{% endblock %}
